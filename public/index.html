<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Durak Online</title>
    <link rel="stylesheet" href="/game.css" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 20px;
        background: #111827;
        color: #f9fafb;
      }
      .container {
        max-width: 720px;
        margin: 0 auto;
      }
      .card {
        background: #1f2937;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }
      input,
      button,
      select {
        padding: 10px 12px;
        border-radius: 6px;
        border: 1px solid #374151;
        background: #111827;
        color: #f9fafb;
        margin-right: 8px;
      }
      button {
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }
      .vote {
        background: #111827;
        border: 1px solid #4b5563;
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
      }
      .vote.active {
        border-color: #22d3ee;
        color: #22d3ee;
      }
      .player-list {
        margin-bottom: 8px;
      }
      .player {
        padding: 4px 0;
      }
      .emoji {
        font-size: 20px;
      }
      .log {
        font-family: monospace;
        white-space: pre-wrap;
        background: #0f172a;
        padding: 12px;
        border-radius: 8px;
        height: 160px;
        overflow: auto;
      }
      /* Legacy card styles for lobby (kept for non-game views) */
      .card-item {
        position: relative;
        min-width: 60px;
        width: 60px;
        height: 88px;
        background: #fffbe6;
        border: 2px solid #d1d5db;
        border-radius: 8px;
        font-weight: bold;
        color: #1e293b;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 4px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        font-size: 13px;
        line-height: 1.1;
        user-select: none;
      }
      .card-item.red { color: #dc2626; }
      .card-item.black { color: #1e293b; }
      .trump-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-weight: bold;
        font-size: 18px;
      }
      .trump-badge.red { color: #dc2626; }
      .trump-badge.black { color: #f9fafb; }
    </style>
  </head>
  <body>
    <!-- Lobby View -->
    <div id="lobby-view" class="container">
      <h1>Durak Online</h1>

      <div class="card">
        <h2>Connect</h2>
        <div class="row">
          <input id="name" placeholder="Player name" />
          <input id="room" placeholder="Room code" />
          <button id="join">Join / Create</button>
        </div>
      </div>

      <div class="card">
        <h2>Room</h2>
        <p id="room-info">Not connected.</p>
        <div id="players"></div>
        <div class="row">
          <button class="vote" data-mode="4">Vote 4 (Omaha)</button>
          <button class="vote" data-mode="6">Vote 6 (Durak)</button>
          <button id="add-bot">Add Bot</button>
          <button id="start">Start Game</button>
          <button id="restart" style="display:none">New Game</button>
        </div>
        <p id="vote-info"></p>
      </div>

      <div class="card">
        <h2>Emoji</h2>
        <div class="row" id="emoji-bar"></div>
      </div>

      <details style="margin-top:8px">
        <summary style="cursor:pointer;color:#6b7280">Log</summary>
        <div class="card">
          <div class="log" id="log"></div>
        </div>
      </details>
    </div>

    <!-- Hidden legacy elements needed by old app.js refs -->
    <div style="display:none">
      <div id="game-meta"></div>
      <div id="turn-timer"></div>
      <div id="table-area"></div>
      <select id="attack-index"></select>
      <button id="attack"></button>
      <button id="defend"></button>
      <button id="transfer"></button>
      <button id="discard"></button>
      <button id="end-attack"></button>
      <button id="take-cards"></button>
      <div id="hand"></div>
    </div>

    <!-- Fullscreen Game View -->
    <div id="game-view" class="game-screen">
      <div class="opponents-bar" id="opponents-bar"></div>
      <div class="game-info-bar" id="game-info-bar"></div>
      <div class="game-table" id="game-table"></div>
      <div class="action-bar" id="action-bar"></div>
      <div class="hand-fan" id="game-hand"></div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
